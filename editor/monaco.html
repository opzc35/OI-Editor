<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Monaco Editor</title>
    <style>html,body,#container{height:100%;margin:0;padding:0;}</style>
    <!-- 本地加载 require.js/loader.js 和 monaco-editor -->
    <script src="monaco/loader.js"></script>
</head>
<body>
<div id="container" style="width:100vw;height:100vh;"></div>
<script>
    let editor;
    require.config({ paths: { 'vs': 'monaco/min/vs' } });
    require(['vs/editor/editor.main'], function () {
        editor = monaco.editor.create(document.getElementById('container'), {
            value: '',
            language: 'python',
            theme: 'vs-dark',
            automaticLayout: true
        });
        window.setEditorCode = function(code) {
            editor.setValue(code);
        }
        window.setEditorTheme = function(theme) {
            monaco.editor.setTheme(theme);
        }
    });
</script>
</body>
</html>
