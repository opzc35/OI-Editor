name: Build OI-Editor

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Prepare compilers
        shell: bash
        run: |
          mkdir -p compiler
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            sudo apt-get update
            sudo apt-get install -y g++ fp-compiler
            which g++ && g++ --version
            which fpc && fpc -iV
            cp $(which g++) compiler/ || true
            cp $(which fpc) compiler/ || true
          elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            choco install -y mingw
            choco install -y fpc
            cp C:/tools/mingw64/bin/g++.exe compiler/ || true
            cp "C:/Program Files (x86)/FreePascal/bin/i386-win32/fpc.exe" compiler/ || true
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            brew update
            brew install gcc fpc
            which g++ && g++ --version
            which fpc && fpc -iV
            cp $(which g++) compiler/ || true
            cp $(which fpc) compiler/ || true
          fi
      - name: Build executable
        run: |
          bash build/build_all.sh
        shell: bash
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OI-Editor-${{ matrix.os }}
          path: dist/
      - name: Upload Release Asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
