name: Build OI-Editor

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Prepare compilers
        shell: bash
        run: |
          mkdir -p resources/compilers
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            sudo apt-get update
            sudo apt-get install -y g++ fp-compiler
            which g++ && g++ --version
            which fpc && fpc -iV
            cp $(which g++) resources/compilers/ || true
            cp $(which fpc) resources/compilers/ || true
          elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            choco install -y mingw
            choco install -y fpc || echo "skip fpc"
            cp C:/tools/mingw64/bin/g++.exe resources/compilers/ || true
            cp "C:/Program Files (x86)/FreePascal/bin/i386-win32/fpc.exe" resources/compilers/ || true
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            brew update
            brew install gcc fpc
            which g++ && g++ --version
            which fpc && fpc -iV
            cp $(which g++) resources/compilers/ || true
            cp $(which fpc) resources/compilers/ || true
          fi
      - name: Build executable
        run: |
          bash build/build_all.sh
        shell: bash
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OI-Editor-${{ matrix.os }}
          path: dist/
      - name: Upload Release Asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
      - name: Download Monaco Editor
        run: |
          MONACO_VERSION=0.44.0
          MONACO_URL="https://github.com/microsoft/monaco-editor/releases/download/v$MONACO_VERSION/monaco-editor-$MONACO_VERSION.zip"
          MONACO_TMP=monaco_tmp
          MONACO_DIR=editor/monaco
          if [ ! -d "$MONACO_DIR/min/vs" ]; then
            mkdir -p $MONACO_TMP
            curl -L "$MONACO_URL" -o $MONACO_TMP/monaco.zip
            unzip -q $MONACO_TMP/monaco.zip -d $MONACO_TMP
            mkdir -p $MONACO_DIR
            cp -r $MONACO_TMP/monaco-editor-$MONACO_VERSION/min $MONACO_DIR/
            cp $MONACO_TMP/monaco-editor-$MONACO_VERSION/loader.js $MONACO_DIR/
            rm -rf $MONACO_TMP
          fi
