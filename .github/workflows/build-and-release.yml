name: Build and Pre-release

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyqt6 pyinstaller

      - name: Build single executable
        run: |
          pyinstaller --onefile --windowed main.py --name OI-Editor

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OI-Editor-${{ matrix.os }}
          path: dist/OI-Editor*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: (github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch') && github.repository == 'opzc35/OI-Editor'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Pre-release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        with:
          tag_name: pre-release-${{ github.sha }}
          release_name: Pre-release ${{ github.sha }}
          draft: false
          prerelease: true

      - name: Upload Linux artifact
        if: always()
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/OI-Editor-ubuntu-latest/OI-Editor
          asset_name: OI-Editor-linux
          asset_content_type: application/octet-stream

      - name: Upload Windows artifact
        if: always()
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/OI-Editor-windows-latest/OI-Editor.exe
          asset_name: OI-Editor-windows.exe
          asset_content_type: application/octet-stream

      - name: Upload MacOS artifact
        if: always()
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/OI-Editor-macos-latest/OI-Editor
          asset_name: OI-Editor-macos
          asset_content_type: application/octet-stream
