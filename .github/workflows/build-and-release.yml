name: Build and Pre-release

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyqt6 pyinstaller

      - name: Build installer executable
        run: |
          pyinstaller --onefile install_oi_editor.py --name OI-Editor-Installer

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: OI-Editor-Installer-${{ matrix.os }}
          path: dist/OI-Editor-Installer*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: (github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch') && github.repository == 'opzc35/OI-Editor'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create download links
        run: |
          echo "Windows: https://github.com/opzc35/OI-Editor/releases/download/pre-release-${{ github.sha }}/OI-Editor-Installer-windows-latest.exe" > dist/download-links.txt
          echo "Linux: https://github.com/opzc35/OI-Editor/releases/download/pre-release-${{ github.sha }}/OI-Editor-Installer-ubuntu-latest" >> dist/download-links.txt
          echo "MacOS: https://github.com/opzc35/OI-Editor/releases/download/pre-release-${{ github.sha }}/OI-Editor-Installer-macos-latest" >> dist/download-links.txt

      - name: Create download links issue
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: OI-Editor 安装包下载链接 ${{ github.sha }}
          content-filepath: dist/download-links.txt
          labels: pre-release,download
